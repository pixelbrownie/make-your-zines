<div class="dashboard-container">
  <div class="dashboard-header">
    <h1 class="bubbly-title">my zine collection &#128214;</h1>
    <button class="btn-create" routerLink="/editor/new">+ Create New</button>
  </div>

  <div *ngIf="loading" class="loading-state">
    <p>finding your zines...</p>
  </div>

  <div *ngIf="!loading && zines.length === 0" class="empty-state">
    <div class="empty-book-stack">
      <div class="empty-book"></div>
      <div class="empty-book secondary"></div>
    </div>
    <h2>Your shelf is empty!</h2>
    <p>Click the button above to begin your first zine.</p>
  </div>

  <div *ngIf="!loading && zines.length > 0" class="zine-collection">
    <div class="zine-item" *ngFor="let zine of zines; let i = index" [routerLink]="['/editor', zine.slug]">
      <div class="zine-cover">
        <div *ngIf="zine.cover_image" class="cover-image">
          <img [src]="zine.cover_image" [alt]="zine.title">
        </div>
        <div *ngIf="!zine.cover_image" class="no-cover">
          <span>No Cover</span>
        </div>
      </div>
      <div class="zine-info">
        <h3 class="zine-title">{{ zine.title || 'Untitled Zine' }}</h3>
        <div class="zine-meta">
          <span class="privacy-tag" [class.private]="!zine.is_public" [class.public]="zine.is_public">
            {{ zine.is_public ? 'PUBLIC' : 'PRIVATE' }}
          </span>
          <label class="toggle-container">
            <input type="checkbox" [checked]="zine.is_public" (change)="togglePrivacy(zine)" (click)="$event.stopPropagation()">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>
