<div class="auth-container">
  <div class="auth-card">
    <h1>create account</h1>
    <p>start making your first zine today!</p>

    <form (ngSubmit)="onSubmit()" #signupForm="ngForm">
      <div class="form-group">
        <label for="username">username</label>
        <input type="text" id="username" name="username" [(ngModel)]="user.username" required placeholder="choose a username">
      </div>

      <div class="form-group">
        <label for="email">email (optional)</label>
        <input type="email" id="email" name="email" [(ngModel)]="user.email" placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label for="password">password</label>
        <input type="password" id="password" name="password" [(ngModel)]="user.password" required placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="!signupForm.form.valid" class="btn-primary">sign up</button>
    </form>

    <div class="auth-footer">
      <span>already have an account? </span>
      <a routerLink="/login">login here</a>
    </div>
  </div>
</div>
